version: '3.9'

services:
  backend:
    build: .
    volumes:
      - static:/app/static
      - media:/app/media
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static:/app/static
      - media:/app/media
    depends_on:
      - backend

volumes:
  static:
  media: